<!DOCTYPE html>
<html>
<head>
    <title>GenPark AI Settings</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; background-color: #f5f5f5; }
        .container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { font-size: 20px; color: #333; }
        label { font-weight: bold; margin-top: 10px; display: block; color: #555; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin-top: 5px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 10px; background-color: #000; color: #fff; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        button:hover { background-color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ GenPark Configuration</h1>
        <label for="gpEmail">GenPark Account Email</label>
        <input type="email" id="gpEmail" placeholder="user@example.com">
        
        <label for="threshold">Auto-Buy Arbitrage Threshold (%)</label>
        <input type="text" id="threshold" value="15">
        
        <button id="saveBtn">Save Settings</button>
        <p id="status" style="color: green; font-size: 12px; display: none;">Settings saved securely.</p>
    </div>
    <script src="options.js"></script>
</body>
</html>
